<!DOCTYPE html>
<html>
<head>
    <title>Jewelry Weight Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-4 rounded shadow-sm" style="max-width: 500px;">
        <h3 class="mb-4 text-center">SKU Weight Adjuster</h3>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3"><label>SKU</label><input type="text" name="sku" class="form-control"></div>
            <div class="row">
                <div class="col-6 mb-3"><label>Orig. Weight</label><input type="number" step="0.01" name="orig_wt" class="form-control" required></div>
                <div class="col-6 mb-3"><label>Orig. Size</label><input type="number" step="0.1" name="orig_sz" class="form-control" required></div>
            </div>
            <div class="row">
                <div class="col-6 mb-3"><label>Target Size</label><input type="number" step="0.1" name="new_sz" class="form-control" required></div>
                <div class="col-6 mb-3">
                    <label>Orig. KT</label>
                    <select name="orig_kt" class="form-select">
                        <option value="9kt">9kt</option><option value="14kt" selected>14kt</option><option value="18kt">18kt</option>
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label>Target KT</label>
                <select name="new_kt" class="form-select">
                    <option value="9kt">9kt</option><option value="14kt">14kt</option><option value="18kt" selected>18kt</option>
                </select>
            </div>
            <button class="btn btn-primary w-100">Calculate</button>
        </form>

        {% if final_weight %}
        <div class="mt-4 p-3 bg-dark text-white rounded">
            <p class="mb-1 small text-secondary text-uppercase">Result for {{ sku }}</p>
            <h2 class="mb-0 text-warning">{{ final_weight }}g</h2>
            <div class="mt-2 small">
                <span>Size Factor: {{ size_factor }}</span> | <span>KT Factor: {{ kt_factor }}</span>
            </div>
        </div>
        {% endif %}
    </div>
</body>
</html>
